# lode.toml — run the Go demo under lode. Self-contained static binary, so no
# [runtime] block. Build: CGO_ENABLED=0 go build -ldflags "-X main.buildVersion=$VER" -o demo-go-linux-x64 .

[global]
app      = "demo-go"
data_dir = "/srv/lode"    # MUST be a persistent volume for the version cache + state.json

[update]
github = "owner/demo-go"            # GitHub Releases … (or: manifest = "https://…/manifest.json")
asset  = "demo-go-linux-x64"        # the binary filename for THIS host (raw, no extension → format = raw)
policy = "auto"                     # off | check | auto

[trust]
require_signature = "enforce"
trusted_keys = ["<key_id>:<base64-pubkey>"]

[command]
run  = "{entry}"   # bare `lode` → run the binary as the long-running server
exec = "{entry}"   # `lode <args>` → binary <args>  (e.g. `lode version`)

[supervise]
readiness     = "state"   # commit a new version only after the app writes state.ready
ready_timeout = 20
health_grace  = 5
stop_timeout  = 10
restart       = "on-failure"

# Optional defaults (a host `-e APP_GREETING=…` overrides these):
[env]
APP_GREETING = "hello from lode (go)"
